name: EOD NSE Report
on:
  schedule:
    - cron: '0 15 * * 1-5' # 8:30 PM IST
  workflow_dispatch:

jobs:
  eod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - run: pip install yfinance pandas numpy pytz requests
      
      - name: Restore history
        uses: actions/cache@v4
        with:
          path: eod_history.json
          key: eod-history-${{ runner.os }}
          restore-keys: eod-history-
          
      - name: Init history if missing
        run: test -f eod_history.json || echo '{}' > eod_history.json
          
      - name: Run EOD Report
        run: python eod_report.py
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
